description: Rate Limit Exceeded - Too many requests
content:
  application/json:
    schema:
      allOf:
        - $ref: "./Error.yaml"
        - type: object
          properties:
            error:
              properties:
                type:
                  examples:
                    - "rate_limit_error"
                code:
                  examples:
                    - "rate_limit_exceeded"
    headers:
      Retry-After:
        schema:
          type: integer
        description: Seconds to wait before retrying

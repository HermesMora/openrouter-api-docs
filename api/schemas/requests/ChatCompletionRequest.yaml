type: object
description: |
  Request body for creating a chat completion.
  Compatible with OpenAI's chat completions API with OpenRouter extensions.
required:
  - model
  - messages
properties:
  model:
    type: string
    description: |
      ID of the model to use. See /models for available options.
      Can be a specific model or a routing preference.
    examples:
      - "anthropic/claude-3.5-sonnet"
      - "openai/gpt-4o"
      - "meta-llama/llama-3.1-405b-instruct"
  
  messages:
    type: array
    description: Array of messages in the conversation
    minItems: 1
    items:
      $ref: "../models/Message.yaml"
  
  temperature:
    type: number
    format: float
    description: Sampling temperature (0-2)
    minimum: 0
    maximum: 2
    default: 1
    examples:
      - 0.7
      - 1.0
  
  top_p:
    type: number
    format: float
    description: Nucleus sampling parameter
    minimum: 0
    maximum: 1
    default: 1
    examples:
      - 0.9
      - 1.0
  
  top_k:
    type: integer
    description: Top-k sampling parameter
    minimum: 0
    examples:
      - 40
      - 50
  
  frequency_penalty:
    type: number
    format: float
    description: Frequency penalty (-2 to 2)
    minimum: -2
    maximum: 2
    default: 0
  
  presence_penalty:
    type: number
    format: float
    description: Presence penalty (-2 to 2)
    minimum: -2
    maximum: 2
    default: 0
  
  repetition_penalty:
    type: number
    format: float
    description: Repetition penalty (0-2)
    minimum: 0
    maximum: 2
    default: 1
  
  max_tokens:
    type: integer
    description: Maximum number of tokens to generate
    minimum: 1
    examples:
      - 1024
      - 4096
  
  seed:
    type: integer
    description: Seed for deterministic sampling
    examples:
      - 12345
  
  stop:
    oneOf:
      - type: string
      - type: array
        items:
          type: string
        maxItems: 4
    description: Stop sequences to end generation
  
  stream:
    type: boolean
    description: Whether to stream the response
    default: false
  
  tools:
    type: array
    description: Tools available for the model to call
    items:
      $ref: "../models/Tool.yaml"
  
  tool_choice:
    oneOf:
      - type: string
        enum:
          - auto
          - none
          - required
      - type: object
        description: Force a specific tool call
        properties:
          type:
            type: string
            enum:
              - function
          function:
            type: object
            properties:
              name:
                type: string
  
  transforms:
    type: array
    description: |
      OpenRouter-specific: Input/output transforms to apply.
      Common values include "middle-out" for context compression.
    items:
      type: string
    examples:
      - ["middle-out"]
  
  models:
    type: array
    description: |
      OpenRouter-specific: Fallback models to try if primary fails.
      Each entry is a model ID.
    items:
      type: string
    examples:
      - ["anthropic/claude-3-haiku", "openai/gpt-3.5-turbo"]
  
  route:
    type: string
    description: |
      OpenRouter-specific: Routing preference.
      "fallback" tries models in order until one succeeds.
    enum:
      - fallback
    examples:
      - "fallback"
  
  response_format:
    type: object
    description: |
      OpenRouter-specific: Force the model to return valid JSON
      by setting type to "json_object".
    properties:
      type:
        type: string
        enum:
          - json_object
          - json_schema
      schema:
        type: object
        description: JSON Schema for response validation (when type is json_schema)

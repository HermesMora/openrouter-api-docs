type: object
description: A tool call generated by the model
required:
  - id
  - type
  - function
properties:
  id:
    type: string
    description: Unique identifier for this tool call
  
  type:
    type: string
    description: Type of tool call
    enum:
      - function
    examples:
      - "function"
  
  function:
    type: object
    required:
      - name
      - arguments
    properties:
      name:
        type: string
        description: Name of the function to call
      arguments:
        type: string
        description: JSON string of the function arguments
